<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Branch A Model Structure</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --ink: #1d2530;
      --muted: #697386;
      --line: #d6dbe3;
      --blue: #2563eb;
      --green: #16803c;
      --amber: #b45309;
      --violet: #7c3aed;
      --red: #dc2626;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    .app {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 360px;
      min-height: 100vh;
    }

    aside {
      border-right: 1px solid var(--line);
      background: #f0f3f7;
      padding: 20px;
    }

    main {
      min-width: 0;
      padding: 22px;
      overflow: auto;
    }

    .details {
      min-width: 0;
      border-left: 1px solid var(--line);
      background: var(--panel);
      padding: 22px;
      overflow: auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.18;
    }

    .subtle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      margin: 0 0 18px;
    }

    .section-title {
      margin: 20px 0 8px;
      color: #475569;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .node-list {
      display: grid;
      gap: 6px;
    }

    .node-list button {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 6px;
      padding: 9px 10px;
      text-align: left;
      font: inherit;
      cursor: pointer;
    }

    .node-list button.active {
      border-color: #111827;
      font-weight: 700;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .toolbar h2 {
      margin: 0;
      font-size: 18px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .key {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .diagram {
      min-width: 900px;
      min-height: 700px;
      position: relative;
      background:
        linear-gradient(#eef2f7 1px, transparent 1px),
        linear-gradient(90deg, #eef2f7 1px, transparent 1px);
      background-size: 28px 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    svg.links {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .flow-node {
      position: absolute;
      width: 188px;
      min-height: 90px;
      border: 1px solid var(--line);
      border-left-width: 5px;
      border-radius: 8px;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
      padding: 11px 12px;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
    }

    .flow-node:hover,
    .flow-node.active {
      transform: translateY(-2px);
      border-color: #111827;
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.13);
    }

    .flow-node h3 {
      margin: 0 0 7px;
      font-size: 14px;
      line-height: 1.25;
    }

    .shape {
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.4;
      word-break: break-word;
    }

    .encoder { border-left-color: var(--green); }
    .projection { border-left-color: var(--amber); }
    .decoder { border-left-color: var(--violet); }
    .io { border-left-color: var(--blue); }
    .adapter { border-left-color: var(--red); }

    .details h2 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    .badge {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 9px;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 14px;
    }

    dl {
      margin: 0;
      display: grid;
      gap: 12px;
    }

    dt {
      color: #475569;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    dd {
      margin: 0;
      color: var(--ink);
      line-height: 1.55;
      font-size: 14px;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 5px;
      padding: 2px 5px;
    }

    @media (max-width: 1120px) {
      .app { grid-template-columns: 240px minmax(0, 1fr); }
      .details {
        grid-column: 1 / -1;
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }

    @media (max-width: 760px) {
      .app { display: block; }
      aside, main, .details { padding: 16px; }
      aside {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }
      .diagram { min-width: 820px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>Branch A Structure</h1>
      <p class="subtle">实验分支 A：移除 content image，只使用 text prompt 和 style image 作为条件。</p>

      <div class="section-title">Nodes</div>
      <div class="node-list" id="nodeList"></div>
    </aside>

    <main>
      <div class="toolbar">
        <h2>text + style image -> FLUX</h2>
        <div class="legend">
          <span class="key"><span class="dot" style="background: var(--blue)"></span>I/O</span>
          <span class="key"><span class="dot" style="background: var(--green)"></span>Encoder</span>
          <span class="key"><span class="dot" style="background: var(--amber)"></span>Condition</span>
          <span class="key"><span class="dot" style="background: var(--violet)"></span>FLUX</span>
          <span class="key"><span class="dot" style="background: var(--red)"></span>Latent</span>
        </div>
      </div>
      <section class="diagram" id="diagram" aria-label="branch A model flow diagram">
        <svg class="links" id="links" viewBox="0 0 900 700" preserveAspectRatio="none"></svg>
      </section>
    </main>

    <section class="details" id="details"></section>
  </div>

  <script>
    const nodes = {
      styleInput: {
        title: "style_image",
        type: "io",
        file: "src/models/font_model.py",
        shape: "[B, 3, H, W]",
        role: "参考风格图像，提供笔触、纹理和整体视觉风格。",
        io: "FontModel(no_content_mode=True).forward(style_image, text_prompt, timestep)"
      },
      textInput: {
        title: "text_prompt",
        type: "io",
        file: "src/models/font_model.py",
        shape: "str | list[str]",
        role: "目标文字内容。真实 FLUX 后端使用 pipeline 自带 CLIP/T5 text encoders 编码。",
        io: "传入 FluxImageDecoder.forward(prompt=...)。"
      },
      styleEncoder: {
        title: "StyleEncoder",
        type: "encoder",
        file: "src/models/style_encoder.py",
        shape: "[B, 3, H, W] -> [B, N_style, D]",
        role: "SigLIP pooled embedding 经过 MLP projection 与 QFormer projection，得到 style tokens。",
        io: "输出作为 extra_condition_tokens 的 style 部分。"
      },
      promptEncoder: {
        title: "FLUX prompt encoders",
        type: "encoder",
        file: "src/models/flux_decoder.py",
        shape: "text -> prompt_embeds, pooled_prompt_embeds, text_ids",
        role: "复用 Diffusers FLUX pipeline 的 encode_prompt，包含 CLIP pooled embedding 与 T5 sequence embedding。",
        io: "FluxImageDecoder.encode_prompt(prompt, extra_condition_tokens)。"
      },
      concat: {
        title: "condition concat",
        type: "projection",
        file: "src/models/flux_decoder.py",
        shape: "[B, T_text, 4096] + [B, N_style, D]",
        role: "将 style tokens 映射到 FLUX joint_attention_dim 后拼到 prompt_embeds 序列后面。",
        io: "进入 FluxTransformer2DModel.encoder_hidden_states。"
      },
      latents: {
        title: "prepare_latents",
        type: "adapter",
        file: "src/models/flux_decoder.py",
        shape: "[B, L_img, C_latent*4]",
        role: "复用 Diffusers prepare_latents，生成 packed latent tokens 和 img_ids。",
        io: "作为 FluxTransformer2DModel.hidden_states。"
      },
      scheduler: {
        title: "FlowMatch scheduler",
        type: "decoder",
        file: "src/models/flux_decoder.py",
        shape: "timesteps + latents -> updated latents",
        role: "按照 FLUX 官方 denoising loop 逐步调用 scheduler.step。",
        io: "每一步接收 transformer 的 noise_pred。"
      },
      transformer: {
        title: "FluxTransformer2DModel",
        type: "decoder",
        file: "diffusers.FluxTransformer2DModel",
        shape: "latents + prompt/style condition + ids + timestep",
        role: "真实 FLUX denoiser，预测当前 timestep 的更新方向。",
        io: "由 FluxImageDecoder.forward 的 denoising loop 调用。"
      },
      vae: {
        title: "VAE decode",
        type: "decoder",
        file: "src/models/flux_decoder.py",
        shape: "packed latents -> [B, 3, H, W]",
        role: "unpack latents 后使用 FLUX VAE decode，并通过 image_processor 后处理。",
        io: "输出最终图像 tensor 或 PIL。"
      },
      output: {
        title: "output_image",
        type: "io",
        file: "src/models/font_model.py",
        shape: "[B, 3, H, W]",
        role: "分支 A 的生成结果。",
        io: "FontModel.forward_no_content 的返回值。"
      }
    };

    const layout = {
      active: ["styleInput", "textInput", "styleEncoder", "promptEncoder", "concat", "latents", "scheduler", "transformer", "vae", "output"],
      positions: {
        styleInput: [46, 80],
        textInput: [46, 300],
        styleEncoder: [270, 80],
        promptEncoder: [270, 300],
        concat: [494, 190],
        latents: [46, 520],
        transformer: [674, 190],
        scheduler: [494, 500],
        vae: [674, 500],
        output: [674, 610]
      },
      links: [
        ["styleInput", "styleEncoder"],
        ["textInput", "promptEncoder"],
        ["styleEncoder", "concat"],
        ["promptEncoder", "concat"],
        ["concat", "transformer"],
        ["latents", "transformer"],
        ["transformer", "scheduler"],
        ["scheduler", "transformer"],
        ["scheduler", "vae"],
        ["vae", "output"]
      ]
    };

    let selectedNode = "styleInput";
    const diagram = document.getElementById("diagram");
    const linksSvg = document.getElementById("links");
    const details = document.getElementById("details");
    const nodeList = document.getElementById("nodeList");

    function nodeCenter(id) {
      const [x, y] = layout.positions[id];
      return [x + 94, y + 45];
    }

    function drawLinks() {
      linksSvg.innerHTML = "";
      for (const [from, to] of layout.links) {
        const [x1, y1] = nodeCenter(from);
        const [x2, y2] = nodeCenter(to);
        const mid = (x1 + x2) / 2;
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", `M ${x1} ${y1} C ${mid} ${y1}, ${mid} ${y2}, ${x2} ${y2}`);
        path.setAttribute("fill", "none");
        path.setAttribute("stroke", "#94a3b8");
        path.setAttribute("stroke-width", "2");
        path.setAttribute("stroke-linecap", "round");
        linksSvg.appendChild(path);
      }
    }

    function renderNodes() {
      diagram.querySelectorAll(".flow-node").forEach(node => node.remove());
      for (const id of layout.active) {
        const item = nodes[id];
        const [x, y] = layout.positions[id];
        const el = document.createElement("button");
        el.type = "button";
        el.className = `flow-node ${item.type}${id === selectedNode ? " active" : ""}`;
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        el.innerHTML = `<h3>${item.title}</h3><div class="shape">${item.shape}</div>`;
        el.addEventListener("click", () => selectNode(id));
        diagram.appendChild(el);
      }
    }

    function renderNodeList() {
      nodeList.innerHTML = "";
      for (const id of layout.active) {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = nodes[id].title;
        button.className = id === selectedNode ? "active" : "";
        button.addEventListener("click", () => selectNode(id));
        nodeList.appendChild(button);
      }
    }

    function renderDetails(id) {
      const item = nodes[id];
      details.innerHTML = `
        <h2>${item.title}</h2>
        <span class="badge">${item.type}</span>
        <dl>
          <div><dt>Source</dt><dd><code>${item.file}</code></dd></div>
          <div><dt>Shape</dt><dd><code>${item.shape}</code></dd></div>
          <div><dt>Role</dt><dd>${item.role}</dd></div>
          <div><dt>Connection</dt><dd>${item.io}</dd></div>
        </dl>
      `;
    }

    function selectNode(id) {
      selectedNode = id;
      render();
    }

    function render() {
      drawLinks();
      renderNodes();
      renderNodeList();
      renderDetails(selectedNode);
    }

    render();
  </script>
</body>
</html>

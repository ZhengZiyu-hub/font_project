project:
  name: font_project
  output_dir: outputs
  seed: 42

data:
  root: data
  image_size: 64
  batch_size: 2
  num_workers: 0

model:
  name: font_pipeline
  image_channels: 3
  image_encoder_path: /data/zhengziyu/models/siglip-so400m-patch14-384
  condition_dim: 4096
  image_embedding_dim: 1152
  condition_tokens: 128
  condition_heads: 8
  condition_query_tokens: 32
  decoder: flux
  flux_model_path: /data/zhengziyu/models/FLUX.1-dev

train:
  epochs: 1
  learning_rate: 0.0003
  weight_decay: 0.0

inference:
  prompt: "sample glyph"
  num_samples: 1

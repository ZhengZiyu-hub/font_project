project:
  name: font_project
  output_dir: outputs
  seed: 42

data:
  root: data
  image_size: 64
  batch_size: 2
  num_workers: 0

model:
  name: font_pipeline
  image_channels: 3
  hidden_dim: 128

train:
  epochs: 1
  learning_rate: 0.0003
  weight_decay: 0.0

inference:
  prompt: "sample glyph"
  num_samples: 1
